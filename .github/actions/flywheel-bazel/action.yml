name: flywheel-bazel
description: |
  Run bazelisk with GloriousFlywheel cache (`--config=flywheel`) or
  cache+executor (`--config=flywheel-executor`). The vendored bazelrc is
  endpoint-free: this action supplies `--remote_cache` and `--remote_executor`
  from validated environment or inputs. Refuses executor mode on non-cluster
  runners.

  Contract: tinyland-inc/site.scaffold/docs/CI-SCHEMA.md §5.

inputs:
  targets:
    description: Space-separated Bazel targets (e.g. "//app:build //app:test").
    required: true
  command:
    description: Bazel command. One of build | test | run | query.
    required: false
    default: build
  config:
    description: Flywheel config. One of flywheel | flywheel-executor | local.
    required: false
    default: flywheel
  target_class:
    description: |
      Optional REAPI proved-target class (e.g. sveltekit-app-build) for
      the per-lane matrix. Validated against the lanes.json allowlist by
      the caller; this action only enforces the cluster-runner gate.
    required: false
    default: ""
  extra_flags:
    description: Additional flags appended verbatim after the config flag.
    required: false
    default: ""
  bazel_remote_cache:
    description: |
      Optional override for BAZEL_REMOTE_CACHE env. Required when config is
      flywheel or flywheel-executor. Default: read from env injected by
      GloriousFlywheel setup actions or operator environment.
    required: false
    default: ""
  bazel_remote_executor:
    description: |
      Optional override for BAZEL_REMOTE_EXECUTOR env. Required when config is
      flywheel-executor. Default: read from env injected by GloriousFlywheel
      setup actions or operator environment.
    required: false
    default: ""
  runner_class_override:
    description: |
      Override the runner class probe. Use only when wrapping this action
      from a non-standard runner. By default reads `runner.labels` and
      matches against the cluster-class set.
    required: false
    default: ""

outputs:
  executor_used:
    description: "true if --config=flywheel-executor was applied; false otherwise."
    value: ${{ steps.run.outputs.executor_used }}
  config_applied:
    description: Echo of the resolved --config= flag passed to bazelisk.
    value: ${{ steps.run.outputs.config_applied }}

runs:
  using: composite
  steps:
    - name: Resolve runner class
      id: probe
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.runner_class_override }}" ]]; then
          rc="${{ inputs.runner_class_override }}"
        else
          rc=""
          for label in ${RUNNER_LABELS//,/ }; do
            if [[ "$label" =~ ^[a-z0-9][a-z0-9-]*-(nix|nix-heavy|nix-kvm|nix-gpu|docker|dind)$ ]]; then
              rc="$label"
              break
            fi
          done
        fi
        echo "runner_class=$rc" >> "$GITHUB_OUTPUT"
        echo "::notice::flywheel-bazel resolved runner_class=${rc:-<none>}"
      env:
        RUNNER_LABELS: ${{ join(runner.labels, ',') }}

    - name: Refuse executor mode on non-cluster runners
      if: inputs.config == 'flywheel-executor' && steps.probe.outputs.runner_class == ''
      shell: bash
      run: |
        echo "::error::flywheel-executor requires an org-namespaced cluster runner (<org-pool>-nix|-nix-heavy|-nix-kvm|-nix-gpu|-docker|-dind). Got runner.labels=${{ join(runner.labels, ',') }}"
        exit 1

    - name: Install vendored flywheel bazelrc
      shell: bash
      run: |
        set -euo pipefail
        action_dir=$(dirname "${{ github.action_path }}")
        bazelrc_src="$action_dir/../../bazelrc/flywheel.bazelrc"
        if [[ ! -f "$bazelrc_src" ]]; then
          # Fall back to repo-root if ci-templates layout differs.
          bazelrc_src="${{ github.action_path }}/../../bazelrc/flywheel.bazelrc"
        fi
        if [[ -f "$bazelrc_src" ]]; then
          cp "$bazelrc_src" .bazelrc.flywheel
        else
          echo "::warning::flywheel.bazelrc not found in ci-templates; relying on spoke-vendored copy"
        fi

    - name: Run bazelisk
      id: run
      shell: bash
      run: |
        set -euo pipefail
        config_flag=""
        executor_used=false
        remote_args=()
        case "${{ inputs.config }}" in
          local)              config_flag="" ;;
          flywheel)           config_flag="--config=flywheel" ;;
          flywheel-executor)  config_flag="--config=flywheel-executor"; executor_used=true ;;
          *) echo "::error::unknown config: ${{ inputs.config }}"; exit 64 ;;
        esac

        export BAZEL_REMOTE_CACHE="${{ inputs.bazel_remote_cache || env.BAZEL_REMOTE_CACHE }}"
        export BAZEL_REMOTE_EXECUTOR="${{ inputs.bazel_remote_executor || env.BAZEL_REMOTE_EXECUTOR }}"
        remote_upload="${GF_BAZEL_REMOTE_UPLOAD:-false}"

        case "$remote_upload" in
          true|false) ;;
          *) echo "::error::GF_BAZEL_REMOTE_UPLOAD must be true or false"; exit 64 ;;
        esac

        if [[ -n "$config_flag" ]]; then
          if [[ -z "$BAZEL_REMOTE_CACHE" ]]; then
            echo "::error::BAZEL_REMOTE_CACHE is required for ${{ inputs.config }}. The flywheel bazelrc is endpoint-free by contract."
            exit 65
          fi
          remote_args+=(--remote_cache="$BAZEL_REMOTE_CACHE")
          remote_args+=(--remote_upload_local_results="$remote_upload")
          echo "::notice::Bazel remote cache configured from runtime environment (upload=$remote_upload)."
        fi

        if [[ "${{ inputs.config }}" == "flywheel-executor" ]]; then
          if [[ -z "$BAZEL_REMOTE_EXECUTOR" ]]; then
            echo "::error::BAZEL_REMOTE_EXECUTOR is required for flywheel-executor."
            exit 65
          fi
          remote_args+=(--remote_executor="$BAZEL_REMOTE_EXECUTOR")
          echo "::notice::Bazel remote executor configured from runtime environment."
        fi

        if [[ -n "${BAZEL_CREDENTIAL_HELPER:-}" ]]; then
          remote_args+=(--credential_helper="$BAZEL_CREDENTIAL_HELPER")
        fi
        if [[ -n "${BAZEL_REMOTE_HEADER:-}" ]]; then
          remote_args+=(--remote_header="$BAZEL_REMOTE_HEADER")
        fi
        if [[ -n "${BAZEL_REMOTE_CACHE_HEADER:-}" ]]; then
          remote_args+=(--remote_cache_header="$BAZEL_REMOTE_CACHE_HEADER")
        fi
        if [[ -n "${BAZEL_REMOTE_EXEC_HEADER:-}" ]]; then
          remote_args+=(--remote_exec_header="$BAZEL_REMOTE_EXEC_HEADER")
        fi

        # bazelisk dispatch: prefer host PATH (cluster runner images that
        # preinstall bazelisk system-wide); fall back to `nix develop
        # --command` for spokes whose bazelisk is declared in the flake
        # devShell (Tinyland default). Surfaced by darkmap PR #86 / TIN-1407.
        if command -v bazelisk >/dev/null 2>&1; then
          runner=(bazelisk)
          echo "::notice::Using host bazelisk at $(command -v bazelisk)"
        elif command -v nix >/dev/null 2>&1 && [ -f flake.nix ]; then
          runner=(nix develop --command bazelisk)
          echo "::notice::bazelisk not on host PATH; routing via 'nix develop --command bazelisk'"
        else
          echo "::error::bazelisk not on PATH and no flake.nix devShell available to source it from"
          exit 127
        fi

        echo "::group::${runner[*]} ${{ inputs.command }} $config_flag <runtime-remote-args> ${{ inputs.extra_flags }} ${{ inputs.targets }}"
        "${runner[@]}" ${{ inputs.command }} $config_flag "${remote_args[@]}" ${{ inputs.extra_flags }} ${{ inputs.targets }}
        echo "::endgroup::"

        echo "executor_used=$executor_used" >> "$GITHUB_OUTPUT"
        echo "config_applied=$config_flag" >> "$GITHUB_OUTPUT"
