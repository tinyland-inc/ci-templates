name: immutable-release-verify
description: >-
  Fail closed unless immutable releases are enabled or an exact published
  Release and its cryptographic release attestation bind to expected source.

inputs:
  mode:
    description: Verification mode, either settings or published.
    required: true
  repository:
    description: GitHub repository in owner/name form.
    required: true
  tag:
    description: Exact release tag to peel in published mode.
    required: false
  expected-source-sha:
    description: Expected peeled source commit SHA in published mode.
    required: false
  admin-token:
    description: >-
      Short-lived GitHub App installation token scoped to Administration read
      for the target repository. Used only for the immutable-release setting
      request.
    required: false
  contents-token:
    description: >-
      GitHub token with Contents read for exact tag, Release, and release
      attestation reads.
    required: false
  verify-attempts:
    description: Bounded published-verification attempts for Release attestation readiness.
    required: false
    default: "5"
  verify-retry-seconds:
    description: Seconds between bounded published-verification attempts.
    required: false
    default: "3"

outputs:
  immutable-releases-enabled:
    description: true only when settings mode verifies repository enforcement.
    value: ${{ steps.verify.outputs.immutable-releases-enabled }}
  source-sha:
    description: Peeled commit SHA verified for the exact tag.
    value: ${{ steps.verify.outputs.source-sha }}
  release-attestation-verified:
    description: true only when published mode verifies the release attestation.
    value: ${{ steps.verify.outputs.release-attestation-verified }}

runs:
  using: composite
  steps:
    - name: Verify immutable release contract
      id: verify
      shell: bash
      env:
        IMMUTABLE_RELEASE_MODE: ${{ inputs.mode }}
        IMMUTABLE_RELEASE_REPOSITORY: ${{ inputs.repository }}
        IMMUTABLE_RELEASE_TAG: ${{ inputs.tag }}
        IMMUTABLE_RELEASE_EXPECTED_SOURCE_SHA: ${{ inputs.expected-source-sha }}
        IMMUTABLE_RELEASE_ADMIN_TOKEN: ${{ inputs.admin-token }}
        IMMUTABLE_RELEASE_CONTENTS_TOKEN: ${{ inputs.contents-token }}
        IMMUTABLE_RELEASE_VERIFY_ATTEMPTS: ${{ inputs.verify-attempts }}
        IMMUTABLE_RELEASE_VERIFY_RETRY_SECONDS: ${{ inputs.verify-retry-seconds }}
      run: ${{ github.action_path }}/../../../scripts/immutable-release-verify.sh
