name: lane-status-check
description: |
  Post a caller-namespaced per-lane GitHub commit status.

  Compatibility warning: the v2 default remains `ci/lane/<name>`, even though
  the existing spoke caller posts it from the flywheel-build job. The status
  name alone is not runtime evidence, and this generic writer cannot establish
  those semantics.
  New build-only callers should pass `ci/build/`; runtime readiness requires a
  trusted owner-overlay observer with a receipt-bearing runtime contract.

  Contract: tinyland-inc/site.scaffold/docs/CI-SCHEMA.md §8.

inputs:
  commit_sha:
    description: Commit SHA to post the status against.
    required: true
  lane_name:
    description: Lane slug (matches lanes.json lanes[].name).
    required: true
  state:
    description: One of pending | success | failure | error.
    required: true
  target_url:
    description: URL to display in the status (e.g. the lane env URL).
    required: false
    default: ""
  description:
    description: Short status description.
    required: false
    default: ""
  context_prefix:
    description: >-
      Caller-owned status context prefix. The `ci/lane/` default is retained
      only for v2 compatibility and does not prove a deployed environment.
    required: false
    default: ci/lane/
  github_token:
    description: GH token with `repo:status` scope.
    required: false
    default: ${{ github.token }}

outputs:
  context:
    description: Full status context string written.
    value: ${{ steps.post.outputs.context }}

runs:
  using: composite
  steps:
    - name: Post status
      id: post
      shell: bash
      run: |
        set -euo pipefail
        [[ "$INPUT_LANE_NAME" =~ ^[a-z][a-z0-9-]{0,30}$ ]] || {
          echo "::error::lane_name is not a valid lane slug"
          exit 1
        }
        [[ "$INPUT_STATE" =~ ^(pending|success|failure|error)$ ]] || {
          echo "::error::state must be pending, success, failure, or error"
          exit 1
        }
        [[ "$INPUT_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]] || {
          echo "::error::commit_sha must be a full lowercase commit SHA"
          exit 1
        }

        context="${INPUT_CONTEXT_PREFIX}${INPUT_LANE_NAME}"
        desc="$INPUT_DESCRIPTION"
        [[ -z "$desc" ]] && desc="Lane: $INPUT_LANE_NAME"

        payload=$(jq -nc \
          --arg state "$INPUT_STATE" \
          --arg context "$context" \
          --arg description "$desc" \
          --arg target_url "$INPUT_TARGET_URL" \
          '{state: $state, context: $context, description: $description}
           + (if $target_url != "" then {target_url: $target_url} else {} end)')

        echo "$payload" | jq .

        # Use curl rather than `gh api` to avoid taking a dependency on the
        # gh CLI being on the host PATH. On self-hosted runners where gh
        # lives inside a flake devShell (the Tinyland default), the prior
        # `gh api` invocation failed with `gh: command not found` and
        # surfaced as a fake job failure even after the underlying build
        # succeeded. Surfaced by darkmap PR #86 / TIN-1414.
        http_status=$(curl --silent --show-error --output /tmp/lane-status-response.json --write-out '%{http_code}' \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          --data "$payload" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${INPUT_COMMIT_SHA}")
        if [[ "$http_status" -lt 200 || "$http_status" -ge 300 ]]; then
          echo "::error::statuses POST returned HTTP $http_status"
          cat /tmp/lane-status-response.json
          exit 1
        fi

        echo "context=$context" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        INPUT_CONTEXT_PREFIX: ${{ inputs.context_prefix }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        INPUT_LANE_NAME: ${{ inputs.lane_name }}
        INPUT_STATE: ${{ inputs.state }}
        INPUT_TARGET_URL: ${{ inputs.target_url }}
