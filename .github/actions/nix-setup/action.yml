name: "Nix Setup"
description: "Configure Nix and cache hints. Attic may be auto-detected on self-hosted ARC runners; Bazel endpoints are runtime authority supplied by environment or inputs. Outputs cluster-reachability flags consumed by `flywheel-bazel`."

inputs:
  attic-server:
    description: "Attic server URL. Required on self-hosted runners unless ATTIC_SERVER is exported in the runner environment (org overlay / fleet env) — there is no baked default endpoint (TIN-2353)."
    default: ""
  attic-cache:
    description: "Attic cache name"
    default: "main"
  bazel-cache:
    description: "Bazel remote cache endpoint. Optional override for BAZEL_REMOTE_CACHE; no endpoint is invented by this action."
    default: ""

outputs:
  runner_class:
    description: |
      First org-namespaced capability-class label found in `runner.labels`
      (`<org-pool>-nix|-nix-heavy|-nix-kvm|-nix-gpu|-docker|-dind`, e.g.
      `tinyland-nix`, `great-falls-tool-bus-nix`), or empty string if none
      (e.g. github-hosted `ubuntu-latest`). Consumed by `flywheel-bazel` to
      refuse executor mode off-cluster. See
      tinyland-inc/site.scaffold/docs/CI-SCHEMA.md §6.
    value: ${{ steps.detect.outputs.runner_class }}
  attic_reachable:
    description: "`true` if the Attic cache DNS resolved, else `false`."
    value: ${{ steps.detect.outputs.attic_reachable }}
  bazel_cache_reachable:
    description: "`true` if the Bazel remote cache DNS resolved, else `false`."
    value: ${{ steps.detect.outputs.bazel_cache_reachable }}

runs:
  using: "composite"
  steps:
    - name: Detect environment and configure caches
      id: detect
      shell: bash
      run: |
        set -euo pipefail

        runner_class=""
        attic_reachable=false
        bazel_cache_reachable=false

        # Resolve runner_class from runner.labels (passed via env). Capability
        # classes are org-namespaced — `<org-pool>` + `-nix|-nix-heavy|-nix-kvm|
        # -nix-gpu|-docker|-dind` (TIN-2353): match the class suffix, not a
        # tinyland-only literal list, so tenant pools resolve too.
        for label in ${RUNNER_LABELS//,/ }; do
          case "$label" in
            *-nix|*-nix-heavy|*-nix-kvm|*-nix-gpu|*-docker|*-dind)
              runner_class="$label"; break ;;
          esac
        done

        if [ "${{ runner.environment }}" != "github-hosted" ]; then
          # Self-hosted ARC runners have cluster DNS access
          # Endpoint authority lives with the org overlay / fleet runner env —
          # no baked default endpoint (TIN-2353 acceptance #2). tinyland nix
          # pools receive ATTIC_SERVER via fleet env (tofu arc-runner module,
          # runner_type=="nix" only); other orgs export their own or pass the
          # attic-server input. Unset degrades exactly like unreachable DNS
          # (warning + attic_reachable=false) because docker/dind runner types
          # never receive the fleet env and Attic is cache-optional for them —
          # a hard failure here would break supported js-bazel-package lanes.
          ATTIC="${{ inputs.attic-server }}"
          ATTIC_URL="${ATTIC:-${ATTIC_SERVER:-}}"
          if [ -z "$ATTIC_URL" ]; then
            echo "::warning::nix-setup: no Attic endpoint configured — pass the attic-server input or export ATTIC_SERVER in the runner environment (org overlay / fleet env). There is no baked default endpoint; running without Attic cache."
          else
            ATTIC_HOST=$(echo "$ATTIC_URL" | sed 's|https\?://||;s|:.*||')
            if getent hosts "$ATTIC_HOST" >/dev/null 2>&1; then
              echo "ATTIC_SERVER=$ATTIC_URL" >> "$GITHUB_ENV"
              attic_reachable=true
              echo "::notice::Attic cache reachable at $ATTIC_URL"
            else
              echo "::warning::Attic cache DNS unreachable ($ATTIC_HOST) — running without cache"
            fi
          fi

          BAZEL_URL="${{ inputs.bazel-cache }}"
          if [ -z "$BAZEL_URL" ]; then
            BAZEL_URL="${BAZEL_REMOTE_CACHE:-}"
          fi

          if [ -n "$BAZEL_URL" ]; then
            BAZEL_HOST=$(echo "$BAZEL_URL" | sed 's|grpcs\?://||;s|:.*||')
            if getent hosts "$BAZEL_HOST" >/dev/null 2>&1; then
              echo "BAZEL_REMOTE_CACHE=$BAZEL_URL" >> "$GITHUB_ENV"
              bazel_cache_reachable=true
            else
              echo "::warning::Configured Bazel cache DNS unreachable ($BAZEL_HOST) — Flywheel Bazel commands will fail fast unless another step supplies BAZEL_REMOTE_CACHE"
            fi
          else
            echo "::notice::No BAZEL_REMOTE_CACHE configured by input or environment; Flywheel Bazel commands will fail fast if selected."
          fi
        elif [ -n "${{ inputs.attic-server }}" ]; then
          echo "ATTIC_SERVER=${{ inputs.attic-server }}" >> "$GITHUB_ENV"
        fi
        echo "ATTIC_CACHE=${{ inputs.attic-cache }}" >> "$GITHUB_ENV"

        {
          echo "runner_class=$runner_class"
          echo "attic_reachable=$attic_reachable"
          echo "bazel_cache_reachable=$bazel_cache_reachable"
        } >> "$GITHUB_OUTPUT"

        echo "::notice::nix-setup runner_class=${runner_class:-<none>} attic=$attic_reachable bazel_cache=$bazel_cache_reachable"
      env:
        RUNNER_LABELS: ${{ join(runner.labels, ',') }}

    - name: Add Nix to PATH
      shell: bash
      run: |
        for nixbin in /nix/var/nix/profiles/default/bin "$HOME/.nix-profile/bin"; do
          if [ -d "$nixbin" ]; then
            echo "$nixbin" >> "$GITHUB_PATH"
          fi
        done
