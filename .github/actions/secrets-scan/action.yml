name: "Secrets Scan"
description: "Run TruffleHog and Gitleaks for verified secret detection"

inputs:
  trufflehog-args:
    description: "Extra args for TruffleHog"
    default: "--only-verified"
  gitleaks-version:
    description: "Gitleaks version"
    default: "8.21.2"
  gitleaks-config:
    description: "Path to .gitleaks.toml config (skipped if not found)"
    default: ".gitleaks.toml"

runs:
  using: "composite"
  steps:
    - name: TruffleHog scan
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: ${{ inputs.trufflehog-args }}

    - name: Install gitleaks
      shell: bash
      run: |
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${{ inputs.gitleaks-version }}/gitleaks_${{ inputs.gitleaks-version }}_linux_x64.tar.gz" \
          | tar xz -C /usr/local/bin gitleaks

    - name: Run gitleaks
      shell: bash
      run: |
        ARGS="detect --source . --verbose --exit-code 1"
        if [ -f "${{ inputs.gitleaks-config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.gitleaks-config }}"
        fi
        gitleaks $ARGS
