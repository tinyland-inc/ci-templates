name: JS Bazel Package

on:
  workflow_call:
    outputs: {}
    inputs:
      runner_mode:
        description: "Runner policy for validate and same-runner publish jobs: compat, hosted, shared, or repo_owned"
        type: string
        default: "compat"
      shared_runner_labels_json:
        description: "JSON array of shared GloriousFlywheel runner labels used when runner_mode=shared"
        type: string
        default: '["tinyland-docker"]'
      runner_labels_json:
        description: "JSON array of runner labels used by compat mode and required when runner_mode=repo_owned"
        type: string
        default: '["ubuntu-latest"]'
      workspace_mode:
        description: "Workspace policy for validation: isolated or persistent_compat"
        type: string
        default: "persistent_compat"
      publish_mode:
        description: "Publish policy: same_runner or hosted_exception"
        type: string
        default: "same_runner"
      node_versions:
        description: "JSON array of Node.js versions to validate"
        type: string
        default: '["20", "22"]'
      publish_node_version:
        description: "Node.js version used for publish and dry-run steps"
        type: string
        default: "22"
      pnpm_version:
        description: "pnpm version to install"
        type: string
        default: "9"
      metadata_check_command:
        description: "Optional release metadata parity command"
        type: string
        default: ""
      cleanup_paths:
        description: "Optional space-delimited paths to chmod/rm before install when workspace_mode=persistent_compat"
        type: string
        default: "dist node_modules bazel-bin bazel-out bazel-testlogs .pnpm-store pkg pkg-github bazel-pkg.tgz MODULE.bazel.lock"
      prepare_command:
        description: "Optional workspace preparation command after install"
        type: string
        default: ""
      lint_command:
        description: "Optional lint command"
        type: string
        default: ""
      lint_continue_on_error:
        description: "When true, lint failures are reported but do not fail validation"
        type: boolean
        default: false
      typecheck_command:
        description: "Optional typecheck command"
        type: string
        default: ""
      typecheck_continue_on_error:
        description: "When true, typecheck failures are reported but do not fail validation"
        type: boolean
        default: false
      unit_test_command:
        description: "Optional unit test command"
        type: string
        default: ""
      integration_test_command:
        description: "Optional integration test command"
        type: string
        default: ""
      build_command:
        description: "Build command for the workspace artifact"
        type: string
        default: "pnpm build"
      package_check_command:
        description: "Optional package surface validation command"
        type: string
        default: "pnpm check:package"
      bazel_targets:
        description: "Space-delimited Bazel targets to validate"
        type: string
        default: "//:pkg"
      bazel_fetch_retry_attempts:
        description: "Bazel validation attempts for transient external archive fetch failures"
        type: string
        default: "3"
      package_dir:
        description: "Directory containing the Bazel-built publishable package"
        type: string
        default: "./bazel-bin/pkg"
      npm_access:
        description: "npm access mode"
        type: string
        default: "public"
      npm_publish_provenance:
        description: "When true, request npm provenance for npmjs publishes when supported"
        type: boolean
        default: true
      npm_registry_url:
        description: "npm registry URL for publication"
        type: string
        default: "https://registry.npmjs.org"
      github_package_name:
        description: "Optional full package name to use for GitHub Packages dry-runs/publication"
        type: string
        default: ""
      github_package_registry:
        description: "GitHub Packages registry URL"
        type: string
        default: "https://npm.pkg.github.com"
      dry_run:
        description: "When true, publish jobs only perform dry-runs"
        type: boolean
        default: true
    secrets:
      NPM_TOKEN:
        description: "npmjs.com publish token"
        required: false

jobs:
  resolve-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      validate_runner_labels_json: ${{ steps.resolve.outputs.validate_runner_labels_json }}
      publish_runner_labels_json: ${{ steps.resolve.outputs.publish_runner_labels_json }}
    steps:
      - name: Resolve runner labels
        id: resolve
        shell: bash
        env:
          RUNNER_MODE: ${{ inputs.runner_mode }}
          RUNNER_LABELS_JSON: ${{ inputs.runner_labels_json }}
          SHARED_RUNNER_LABELS_JSON: ${{ inputs.shared_runner_labels_json }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          runner_mode = os.environ.get("RUNNER_MODE") or "compat"
          publish_mode = os.environ.get("PUBLISH_MODE") or "same_runner"

          if runner_mode not in {"compat", "hosted", "shared", "repo_owned"}:
              raise SystemExit(f"Unsupported runner_mode: {runner_mode}")

          if publish_mode not in {"same_runner", "hosted_exception"}:
              raise SystemExit(f"Unsupported publish_mode: {publish_mode}")

          def parse_labels(name: str, fallback: str) -> list[str]:
              raw = os.environ.get(name) or fallback
              try:
                  labels = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be a JSON array: {exc}") from exc

              if (
                  not isinstance(labels, list)
                  or not labels
                  or not all(isinstance(label, str) and label for label in labels)
              ):
                  raise SystemExit(f"{name} must be a non-empty JSON array of strings")

              return labels

          runner_labels = parse_labels("RUNNER_LABELS_JSON", '["ubuntu-latest"]')
          shared_runner_labels = parse_labels(
              "SHARED_RUNNER_LABELS_JSON",
              '["tinyland-docker"]',
          )

          if runner_mode == "hosted":
              validate_runner_labels = ["ubuntu-latest"]
          elif runner_mode == "shared":
              validate_runner_labels = shared_runner_labels
          else:
              validate_runner_labels = runner_labels

          if runner_mode == "repo_owned" and validate_runner_labels == ["ubuntu-latest"]:
              raise SystemExit("runner_mode=repo_owned requires explicit runner_labels_json")

          if publish_mode == "hosted_exception":
              publish_runner_labels = ["ubuntu-latest"]
          else:
              publish_runner_labels = validate_runner_labels

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(
                  "validate_runner_labels_json="
                  + json.dumps(validate_runner_labels, separators=(",", ":")),
                  file=output,
              )
              print(
                  "publish_runner_labels_json="
                  + json.dumps(publish_runner_labels, separators=(",", ":")),
                  file=output,
              )
          PY

  validate:
    needs: resolve-runner
    runs-on: ${{ fromJson(needs.resolve-runner.outputs.validate_runner_labels_json) }}
    timeout-minutes: 30
    env:
      BAZEL_FETCH_RETRY_ATTEMPTS: ${{ inputs.bazel_fetch_retry_attempts || '3' }}
      NODE_VERSION: ${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(inputs.node_versions || '["20", "22"]') }}
    steps:
      - name: Validate workflow contract
        shell: bash
        env:
          RUNNER_MODE: ${{ inputs.runner_mode }}
          RUNNER_LABELS_JSON: ${{ inputs.runner_labels_json }}
          WORKSPACE_MODE: ${{ inputs.workspace_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          BAZEL_FETCH_RETRY_ATTEMPTS: ${{ inputs.bazel_fetch_retry_attempts || '3' }}
        run: |
          set -euo pipefail
          case "$RUNNER_MODE" in
            compat|hosted|shared|repo_owned) ;;
            *)
              echo "Unsupported runner_mode: $RUNNER_MODE" >&2
              exit 1
              ;;
          esac
          case "$WORKSPACE_MODE" in
            isolated|persistent_compat) ;;
            *)
              echo "Unsupported workspace_mode: $WORKSPACE_MODE" >&2
              exit 1
              ;;
          esac
          case "$PUBLISH_MODE" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: $PUBLISH_MODE" >&2
              exit 1
              ;;
          esac
          case "$BAZEL_FETCH_RETRY_ATTEMPTS" in
            ""|*[!0-9]*)
              echo "bazel_fetch_retry_attempts must be a positive integer" >&2
              exit 1
              ;;
          esac
          if [ "$BAZEL_FETCH_RETRY_ATTEMPTS" -lt 1 ] || [ "$BAZEL_FETCH_RETRY_ATTEMPTS" -gt 5 ]; then
            echo "bazel_fetch_retry_attempts must be between 1 and 5" >&2
            exit 1
          fi
          if [ "$RUNNER_MODE" = "repo_owned" ] && [ "$RUNNER_LABELS_JSON" = '["ubuntu-latest"]' ]; then
            echo "runner_mode=repo_owned requires explicit runner_labels_json" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: ${{ inputs.workspace_mode != 'persistent_compat' }}

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - name: Resolve working directory
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE_DIR="$GITHUB_WORKSPACE"
          if [ "${{ inputs.workspace_mode }}" = "isolated" ]; then
            WORKSPACE_DIR="$RUNNER_TEMP/js-bazel-package-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${{ matrix.node-version }}"
            rm -rf "$WORKSPACE_DIR"
            mkdir -p "$WORKSPACE_DIR"
            cp -a "$GITHUB_WORKSPACE"/. "$WORKSPACE_DIR"
          fi
          echo "WORKSPACE_DIR=$WORKSPACE_DIR" >> "$GITHUB_ENV"

      - name: Clean stale workspace artifacts
        if: ${{ inputs.workspace_mode == 'persistent_compat' && inputs.cleanup_paths != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          for path in ${{ inputs.cleanup_paths }}; do
            case "$path" in
              ""|/*|*..*|-*)
                echo "Refusing unsafe cleanup path: $path" >&2
                exit 1
                ;;
            esac
            chmod -R u+w -- "$path" 2>/dev/null || true
            rm -rf -- "$path"
          done

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ inputs.pnpm_version || '9' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            **/pnpm-lock.yaml

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Install Bazel fetch retry helper
        shell: bash
        run: |
          set -euo pipefail
          helper_path="$RUNNER_TEMP/js-bazel-package-bazel-fetch-retry.sh"
          cat > "$helper_path" <<'BASH'
          is_transient_bazel_fetch_failure() {
            local log_path="$1"
            grep -Eiq "(Error downloading|GET returned 5[0-9][0-9]|Bad Gateway|Proxy Error|connection reset|Connection timed out|TLS handshake timeout|Temporary failure)" "$log_path"
          }

          run_with_bazel_fetch_retry() {
            local label="$1"
            local command="$2"
            local attempts="${BAZEL_FETCH_RETRY_ATTEMPTS:-3}"
            local attempt=1
            local slug

            slug="$(printf '%s' "$label" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]' '-' | sed -E 's/^-+//; s/-+$//')"
            if [ -z "$slug" ]; then
              slug="command"
            fi

            while [ "$attempt" -le "$attempts" ]; do
              local log_path="$RUNNER_TEMP/js-bazel-package-${slug}-attempt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${NODE_VERSION:-unknown}-${attempt}.log"
              set +e
              bash -e -u -o pipefail -c "$command" 2>&1 | tee "$log_path"
              local status="${PIPESTATUS[0]}"
              set -e

              if [ "$status" -eq 0 ]; then
                return 0
              fi

              if [ "$attempt" -eq "$attempts" ]; then
                echo "::error::$label failed after $attempts attempt(s)."
                return "$status"
              fi

              if ! is_transient_bazel_fetch_failure "$log_path"; then
                echo "::error::$label failed with a non-fetch error; not retrying."
                return "$status"
              fi

              echo "::warning::$label hit a transient Bazel external fetch/download failure on attempt $attempt/$attempts; retrying."
              npx --yes @bazel/bazelisk shutdown >/dev/null 2>&1 || true
              sleep 10
              attempt=$((attempt + 1))
            done
          }
          BASH
          echo "BAZEL_FETCH_RETRY_HELPER=$helper_path" >> "$GITHUB_ENV"

      - name: Prepare workspace
        if: ${{ inputs.prepare_command != '' }}
        shell: bash
        env:
          COMMAND: ${{ inputs.prepare_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Prepare workspace" "$COMMAND"

      - name: Verify release metadata
        if: ${{ inputs.metadata_check_command != '' }}
        shell: bash
        env:
          COMMAND: ${{ inputs.metadata_check_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Verify release metadata" "$COMMAND"

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        continue-on-error: ${{ inputs.lint_continue_on_error }}
        shell: bash
        env:
          COMMAND: ${{ inputs.lint_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Lint" "$COMMAND"

      - name: Typecheck
        if: ${{ inputs.typecheck_command != '' }}
        continue-on-error: ${{ inputs.typecheck_continue_on_error }}
        shell: bash
        env:
          COMMAND: ${{ inputs.typecheck_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Typecheck" "$COMMAND"

      - name: Unit tests
        if: ${{ inputs.unit_test_command != '' }}
        shell: bash
        env:
          COMMAND: ${{ inputs.unit_test_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Unit tests" "$COMMAND"

      - name: Integration tests
        if: ${{ inputs.integration_test_command != '' }}
        shell: bash
        env:
          COMMAND: ${{ inputs.integration_test_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Integration tests" "$COMMAND"

      - name: Build workspace artifact
        shell: bash
        env:
          COMMAND: ${{ inputs.build_command || 'pnpm build' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Build workspace artifact" "$COMMAND"

      - name: Validate package surface
        if: ${{ inputs.package_check_command != '' }}
        shell: bash
        env:
          COMMAND: ${{ inputs.package_check_command }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Validate package surface" "$COMMAND"

      - name: Validate Bazel targets
        shell: bash
        env:
          BAZEL_TARGETS: ${{ inputs.bazel_targets || '//:pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          # shellcheck disable=SC2153
          read -r -a bazel_targets <<< "$BAZEL_TARGETS"

          # shellcheck source=/dev/null
          source "$BAZEL_FETCH_RETRY_HELPER"
          run_with_bazel_fetch_retry "Validate Bazel targets" "npx --yes @bazel/bazelisk build ${bazel_targets[*]} --verbose_failures"

      - name: Validate npm tarball from Bazel artifact
        shell: bash
        env:
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          npm pack --dry-run "$PACKAGE_DIR"

      - name: Validate npm publish dry-run from Bazel artifact
        shell: bash
        env:
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          npm publish --dry-run --ignore-scripts --access "$NPM_ACCESS" "$PACKAGE_DIR"

      - name: Validate GitHub Packages dry-run from Bazel artifact
        if: ${{ inputs.github_package_name != '' }}
        shell: bash
        env:
          GITHUB_PACKAGE_NAME: ${{ inputs.github_package_name }}
          GITHUB_PACKAGE_REGISTRY: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          rm -rf pkg-github
          cp -R "$PACKAGE_DIR" pkg-github
          chmod -R u+w pkg-github
          node - <<'NODE'
          const fs = require('fs');
          const path = './pkg-github/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.name = process.env.GITHUB_PACKAGE_NAME;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: process.env.GITHUB_PACKAGE_REGISTRY
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE
          npm publish ./pkg-github --dry-run --ignore-scripts

      - name: Archive Bazel package artifact
        shell: bash
        env:
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          PACKAGE_PARENT=$(dirname "$PACKAGE_DIR")
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          tar -czf bazel-pkg.tgz -C "$PACKAGE_PARENT" "$PACKAGE_BASENAME"

      - name: Upload Bazel package artifact
        if: ${{ matrix.node-version == (inputs.publish_node_version || '22') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bazel-pkg
          path: ${{ env.WORKSPACE_DIR }}/bazel-pkg.tgz
          if-no-files-found: error

  publish-npm:
    needs:
      - resolve-runner
      - validate
    if: ${{ inputs.dry_run == false }}
    runs-on: ${{ fromJson(needs.resolve-runner.outputs.publish_runner_labels_json) }}
    timeout-minutes: 20
    steps:
      - name: Validate publish contract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.publish_mode }}" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: ${{ inputs.publish_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.publish_node_version || '22' }}
          registry-url: ${{ inputs.npm_registry_url || 'https://registry.npmjs.org' }}

      - name: Download Bazel package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bazel-pkg

      - name: Extract Bazel package artifact into isolated publish workspace
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_ROOT="$RUNNER_TEMP/js-bazel-package-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          rm -rf "$PUBLISH_ROOT"
          mkdir -p "$PUBLISH_ROOT"
          tar -xzf bazel-pkg.tgz -C "$PUBLISH_ROOT"
          echo "PUBLISH_ROOT=$PUBLISH_ROOT" >> "$GITHUB_ENV"

      - name: Publish npm artifact
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
          RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: |
          set -euo pipefail
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          PUBLISH_ARGS=("$PUBLISH_ROOT/$PACKAGE_BASENAME" --ignore-scripts --access "$NPM_ACCESS")
          if [ "${{ inputs.npm_publish_provenance }}" = "true" ] && [ "$RUNNER_ENVIRONMENT" != "self-hosted" ]; then
            PUBLISH_ARGS+=(--provenance)
          fi
          npm publish "${PUBLISH_ARGS[@]}"

  publish-github:
    needs:
      - resolve-runner
      - validate
    if: ${{ inputs.github_package_name != '' && inputs.dry_run == false }}
    runs-on: ${{ fromJson(needs.resolve-runner.outputs.publish_runner_labels_json) }}
    timeout-minutes: 20
    steps:
      - name: Validate publish contract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.publish_mode }}" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: ${{ inputs.publish_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.publish_node_version || '22' }}
          registry-url: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}

      - name: Download Bazel package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bazel-pkg

      - name: Extract Bazel package artifact into isolated publish workspace
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_ROOT="$RUNNER_TEMP/js-bazel-package-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          rm -rf "$PUBLISH_ROOT"
          mkdir -p "$PUBLISH_ROOT"
          tar -xzf bazel-pkg.tgz -C "$PUBLISH_ROOT"
          echo "PUBLISH_ROOT=$PUBLISH_ROOT" >> "$GITHUB_ENV"

      - name: Prepare GitHub Packages publish directory
        shell: bash
        env:
          GITHUB_PACKAGE_NAME: ${{ inputs.github_package_name }}
          GITHUB_PACKAGE_REGISTRY: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          rm -rf "$PUBLISH_ROOT/pkg-github"
          cp -R "$PUBLISH_ROOT/$PACKAGE_BASENAME" "$PUBLISH_ROOT/pkg-github"
          chmod -R u+w "$PUBLISH_ROOT/pkg-github"
          node - <<'NODE'
          const fs = require('fs');
          const path = process.env.PUBLISH_ROOT + '/pkg-github/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.name = process.env.GITHUB_PACKAGE_NAME;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: process.env.GITHUB_PACKAGE_REGISTRY
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Publish GitHub Packages artifact
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
        run: npm publish "$PUBLISH_ROOT/pkg-github" --access "$NPM_ACCESS" --ignore-scripts
