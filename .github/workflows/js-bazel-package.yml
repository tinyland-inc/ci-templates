name: JS Bazel Package

on:
  workflow_call:
    outputs: {}
    inputs:
      runner_mode:
        description: "Runner policy for validate and same-runner publish jobs: compat, hosted, shared, or repo_owned"
        type: string
        default: "compat"
      shared_runner_labels_json:
        description: "JSON array of shared GloriousFlywheel runner labels used when runner_mode=shared"
        type: string
        default: '["tinyland-docker"]'
      runner_labels_json:
        description: "JSON array of runner labels used by compat mode and required when runner_mode=repo_owned"
        type: string
        default: '["ubuntu-latest"]'
      workspace_mode:
        description: "Workspace policy for validation: isolated or persistent_compat"
        type: string
        default: "persistent_compat"
      publish_mode:
        description: "Publish policy: same_runner or hosted_exception"
        type: string
        default: "same_runner"
      node_versions:
        description: "JSON array of Node.js versions to validate"
        type: string
        default: '["20", "22"]'
      publish_node_version:
        description: "Node.js version used for publish and dry-run steps"
        type: string
        default: "22"
      pnpm_version:
        description: "pnpm version to install"
        type: string
        default: "9"
      metadata_check_command:
        description: "Optional release metadata parity command"
        type: string
        default: ""
      cleanup_paths:
        description: "Optional space-delimited paths to chmod/rm before install when workspace_mode=persistent_compat"
        type: string
        default: "dist node_modules bazel-bin bazel-out bazel-testlogs .pnpm-store pkg pkg-github bazel-pkg.tgz MODULE.bazel.lock"
      prepare_command:
        description: "Optional workspace preparation command after install"
        type: string
        default: ""
      lint_command:
        description: "Optional lint command"
        type: string
        default: ""
      lint_continue_on_error:
        description: "When true, lint failures are reported but do not fail validation"
        type: boolean
        default: false
      typecheck_command:
        description: "Optional typecheck command"
        type: string
        default: ""
      typecheck_continue_on_error:
        description: "When true, typecheck failures are reported but do not fail validation"
        type: boolean
        default: false
      unit_test_command:
        description: "Optional unit test command"
        type: string
        default: ""
      integration_test_command:
        description: "Optional integration test command"
        type: string
        default: ""
      build_command:
        description: "Build command for the workspace artifact"
        type: string
        default: "pnpm build"
      package_check_command:
        description: "Optional package surface validation command"
        type: string
        default: "pnpm check:package"
      bazel_targets:
        description: "Space-delimited Bazel targets to validate"
        type: string
        default: "//:pkg"
      package_dir:
        description: "Directory containing the Bazel-built publishable package"
        type: string
        default: "./bazel-bin/pkg"
      npm_access:
        description: "npm access mode"
        type: string
        default: "public"
      npm_publish_provenance:
        description: "When true, request npm provenance for npmjs publishes when supported"
        type: boolean
        default: true
      npm_registry_url:
        description: "npm registry URL for publication"
        type: string
        default: "https://registry.npmjs.org"
      github_package_name:
        description: "Optional full package name to use for GitHub Packages dry-runs/publication"
        type: string
        default: ""
      github_package_registry:
        description: "GitHub Packages registry URL"
        type: string
        default: "https://npm.pkg.github.com"
      dry_run:
        description: "When true, publish jobs only perform dry-runs"
        type: boolean
        default: true
    secrets:
      NPM_TOKEN:
        description: "npmjs.com publish token"
        required: false

jobs:
  validate:
    runs-on: ${{ fromJson(inputs.runner_mode == 'shared' && inputs.shared_runner_labels_json || inputs.runner_labels_json || '["ubuntu-latest"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJson(inputs.node_versions || '["20", "22"]') }}
    steps:
      - name: Validate workflow contract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.runner_mode }}" in
            compat|hosted|shared|repo_owned) ;;
            *)
              echo "Unsupported runner_mode: ${{ inputs.runner_mode }}" >&2
              exit 1
              ;;
          esac
          case "${{ inputs.workspace_mode }}" in
            isolated|persistent_compat) ;;
            *)
              echo "Unsupported workspace_mode: ${{ inputs.workspace_mode }}" >&2
              exit 1
              ;;
          esac
          case "${{ inputs.publish_mode }}" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: ${{ inputs.publish_mode }}" >&2
              exit 1
              ;;
          esac
          if [ "${{ inputs.runner_mode }}" = "repo_owned" ] && [ "${{ inputs.runner_labels_json }}" = '["ubuntu-latest"]' ]; then
            echo "runner_mode=repo_owned requires explicit runner_labels_json" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: ${{ inputs.workspace_mode != 'persistent_compat' }}

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - name: Resolve working directory
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE_DIR="$GITHUB_WORKSPACE"
          if [ "${{ inputs.workspace_mode }}" = "isolated" ]; then
            WORKSPACE_DIR="$RUNNER_TEMP/js-bazel-package-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}-${{ matrix.node-version }}"
            rm -rf "$WORKSPACE_DIR"
            mkdir -p "$WORKSPACE_DIR"
            cp -a "$GITHUB_WORKSPACE"/. "$WORKSPACE_DIR"
          fi
          echo "WORKSPACE_DIR=$WORKSPACE_DIR" >> "$GITHUB_ENV"

      - name: Clean stale workspace artifacts
        if: ${{ inputs.workspace_mode == 'persistent_compat' && inputs.cleanup_paths != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          for path in ${{ inputs.cleanup_paths }}; do
            case "$path" in
              ""|/*|*..*|-*)
                echo "Refusing unsafe cleanup path: $path" >&2
                exit 1
                ;;
            esac
            chmod -R u+w -- "$path" 2>/dev/null || true
            rm -rf -- "$path"
          done

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ inputs.pnpm_version || '9' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            **/pnpm-lock.yaml

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Prepare workspace
        if: ${{ inputs.prepare_command != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.prepare_command }}

      - name: Verify release metadata
        if: ${{ inputs.metadata_check_command != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.metadata_check_command }}

      - name: Lint
        if: ${{ inputs.lint_command != '' }}
        continue-on-error: ${{ inputs.lint_continue_on_error }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.lint_command }}

      - name: Typecheck
        if: ${{ inputs.typecheck_command != '' }}
        continue-on-error: ${{ inputs.typecheck_continue_on_error }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.typecheck_command }}

      - name: Unit tests
        if: ${{ inputs.unit_test_command != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.unit_test_command }}

      - name: Integration tests
        if: ${{ inputs.integration_test_command != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.integration_test_command }}

      - name: Build workspace artifact
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.build_command || 'pnpm build' }}

      - name: Validate package surface
        if: ${{ inputs.package_check_command != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          ${{ inputs.package_check_command }}

      - name: Validate Bazel targets
        shell: bash
        env:
          BAZEL_TARGETS: ${{ inputs.bazel_targets || '//:pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          npx --yes @bazel/bazelisk build $BAZEL_TARGETS --verbose_failures

      - name: Validate npm tarball from Bazel artifact
        shell: bash
        env:
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          npm pack --dry-run "$PACKAGE_DIR"

      - name: Validate npm publish dry-run from Bazel artifact
        shell: bash
        env:
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          npm publish --dry-run --ignore-scripts --access "$NPM_ACCESS" "$PACKAGE_DIR"

      - name: Validate GitHub Packages dry-run from Bazel artifact
        if: ${{ inputs.github_package_name != '' }}
        shell: bash
        env:
          GITHUB_PACKAGE_NAME: ${{ inputs.github_package_name }}
          GITHUB_PACKAGE_REGISTRY: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          rm -rf pkg-github
          cp -R "$PACKAGE_DIR" pkg-github
          chmod -R u+w pkg-github
          node - <<'NODE'
          const fs = require('fs');
          const path = './pkg-github/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.name = process.env.GITHUB_PACKAGE_NAME;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: process.env.GITHUB_PACKAGE_REGISTRY
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE
          npm publish ./pkg-github --dry-run --ignore-scripts

      - name: Archive Bazel package artifact
        shell: bash
        env:
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          PACKAGE_PARENT=$(dirname "$PACKAGE_DIR")
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          tar -czf bazel-pkg.tgz -C "$PACKAGE_PARENT" "$PACKAGE_BASENAME"

      - name: Upload Bazel package artifact
        if: ${{ matrix.node-version == (inputs.publish_node_version || '22') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bazel-pkg
          path: ${{ env.WORKSPACE_DIR }}/bazel-pkg.tgz
          if-no-files-found: error

  publish-npm:
    needs: validate
    if: ${{ inputs.dry_run == false }}
    runs-on: ${{ fromJson(inputs.publish_mode == 'hosted_exception' && '["ubuntu-latest"]' || inputs.runner_mode == 'shared' && inputs.shared_runner_labels_json || inputs.runner_labels_json || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - name: Validate publish contract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.publish_mode }}" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: ${{ inputs.publish_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.publish_node_version || '22' }}
          registry-url: ${{ inputs.npm_registry_url || 'https://registry.npmjs.org' }}

      - name: Download Bazel package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bazel-pkg

      - name: Extract Bazel package artifact into isolated publish workspace
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_ROOT="$RUNNER_TEMP/js-bazel-package-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          rm -rf "$PUBLISH_ROOT"
          mkdir -p "$PUBLISH_ROOT"
          tar -xzf bazel-pkg.tgz -C "$PUBLISH_ROOT"
          echo "PUBLISH_ROOT=$PUBLISH_ROOT" >> "$GITHUB_ENV"

      - name: Publish npm artifact
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
          RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: |
          set -euo pipefail
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          PUBLISH_ARGS=("$PUBLISH_ROOT/$PACKAGE_BASENAME" --ignore-scripts --access "$NPM_ACCESS")
          if [ "${{ inputs.npm_publish_provenance }}" = "true" ] && [ "$RUNNER_ENVIRONMENT" != "self-hosted" ]; then
            PUBLISH_ARGS+=(--provenance)
          fi
          npm publish "${PUBLISH_ARGS[@]}"

  publish-github:
    needs: validate
    if: ${{ inputs.github_package_name != '' && inputs.dry_run == false }}
    runs-on: ${{ fromJson(inputs.publish_mode == 'hosted_exception' && '["ubuntu-latest"]' || inputs.runner_mode == 'shared' && inputs.shared_runner_labels_json || inputs.runner_labels_json || '["ubuntu-latest"]') }}
    timeout-minutes: 20
    steps:
      - name: Validate publish contract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.publish_mode }}" in
            same_runner|hosted_exception) ;;
            *)
              echo "Unsupported publish_mode: ${{ inputs.publish_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Configure self-hosted cache contract
        if: ${{ runner.environment != 'github-hosted' }}
        uses: tinyland-inc/ci-templates/.github/actions/nix-setup@main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.publish_node_version || '22' }}
          registry-url: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}

      - name: Download Bazel package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bazel-pkg

      - name: Extract Bazel package artifact into isolated publish workspace
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH_ROOT="$RUNNER_TEMP/js-bazel-package-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          rm -rf "$PUBLISH_ROOT"
          mkdir -p "$PUBLISH_ROOT"
          tar -xzf bazel-pkg.tgz -C "$PUBLISH_ROOT"
          echo "PUBLISH_ROOT=$PUBLISH_ROOT" >> "$GITHUB_ENV"

      - name: Prepare GitHub Packages publish directory
        shell: bash
        env:
          GITHUB_PACKAGE_NAME: ${{ inputs.github_package_name }}
          GITHUB_PACKAGE_REGISTRY: ${{ inputs.github_package_registry || 'https://npm.pkg.github.com' }}
          PACKAGE_DIR: ${{ inputs.package_dir || './bazel-bin/pkg' }}
        run: |
          set -euo pipefail
          PACKAGE_BASENAME=$(basename "$PACKAGE_DIR")
          rm -rf "$PUBLISH_ROOT/pkg-github"
          cp -R "$PUBLISH_ROOT/$PACKAGE_BASENAME" "$PUBLISH_ROOT/pkg-github"
          chmod -R u+w "$PUBLISH_ROOT/pkg-github"
          node - <<'NODE'
          const fs = require('fs');
          const path = process.env.PUBLISH_ROOT + '/pkg-github/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.name = process.env.GITHUB_PACKAGE_NAME;
          pkg.publishConfig = {
            ...(pkg.publishConfig || {}),
            registry: process.env.GITHUB_PACKAGE_REGISTRY
          };
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Publish GitHub Packages artifact
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          NPM_ACCESS: ${{ inputs.npm_access || 'public' }}
        run: npm publish "$PUBLISH_ROOT/pkg-github" --access "$NPM_ACCESS" --ignore-scripts
