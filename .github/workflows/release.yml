name: release
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

# Two-mode workflow:
#
# 1. On pull_request to main: assert this PR changes CHANGELOG.md
#    `## [Unreleased]` and leaves that section non-empty. PRs that add
#    features/fixes/breaks MUST amend it per RELEASING.md.
#
# 2. On push to main: if the head commit's message starts with
#    `release: vX.Y.Z`, cut the immutable tag and move the floating
#    @vX major tag. This is the documented release flow; it does NOT
#    auto-tag arbitrary merges.

jobs:
  changelog-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: "Assert this PR amends ## [Unreleased]"
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          subject=$(git log -1 --pretty=%s "$head")
          if [[ "$subject" =~ ^release:\ v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::notice::release PR detected ($subject); allowing empty ## [Unreleased]"
            exit 0
          fi
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md missing"
            exit 1
          fi
          if ! git cat-file -e "$base:CHANGELOG.md"; then
            echo "::error::base revision has no CHANGELOG.md"
            exit 1
          fi
          extract_unreleased() {
            awk '/^## \[Unreleased\]/{flag=1;next} /^## \[/{flag=0} flag' \
              | grep -vE '^\s*$' || true
          }
          base_body=$(git show "$base:CHANGELOG.md" | extract_unreleased)
          head_body=$(extract_unreleased < CHANGELOG.md)
          if [ -z "$head_body" ]; then
            echo "::error file=CHANGELOG.md::## [Unreleased] is empty. Amend per RELEASING.md before merging."
            exit 1
          fi
          if [ "$head_body" = "$base_body" ]; then
            echo "::error file=CHANGELOG.md::This PR did not amend ## [Unreleased]."
            exit 1
          fi
          echo "::notice::This PR amends CHANGELOG.md [Unreleased]"

  tag-on-release-commit:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use the workflow GITHUB_TOKEN; sufficient to push tags via the
          # contents:write permission above.
          token: ${{ github.token }}

      - name: Detect release commit
        id: detect
        run: |
          set -euo pipefail
          subject=$(git log -1 --pretty=%s "${{ github.sha }}")
          echo "subject: $subject"
          if [[ ! "$subject" =~ ^release:\ v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::notice::head commit is not a release commit; skipping tag cut"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="v${BASH_REMATCH[1]}"
          major="${version%%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major"     >> "$GITHUB_OUTPUT"
          echo "is_release=true"  >> "$GITHUB_OUTPUT"

      - name: Verify tag does not exist
        if: steps.detect.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ steps.detect.outputs.version }}" >/dev/null; then
            echo "::error::Tag ${{ steps.detect.outputs.version }} already exists. RELEASING.md: never reuse a tag."
            exit 1
          fi

      - name: Verify CHANGELOG.md has a section for this version
        if: steps.detect.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.detect.outputs.version }}"
          v_stripped="${v#v}"
          if ! grep -qE "^## \[${v_stripped}\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing ## [${v_stripped}] section. Move ## [Unreleased] contents before tagging."
            exit 1
          fi

      - name: Configure git identity
        if: steps.detect.outputs.is_release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cut immutable + floating tags
        if: steps.detect.outputs.is_release == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.detect.outputs.version }}"
          major="${{ steps.detect.outputs.major }}"
          current_major_ref="$(
            git ls-remote --tags origin "refs/tags/$major" | awk '{print $1}'
          )"

          git tag -a "$v" -m "$v"
          git tag -f -a "$major" -m "track $v"

          git push origin "$v"
          if [ -n "$current_major_ref" ]; then
            git push origin "refs/tags/$major" \
              --force-with-lease="refs/tags/$major:$current_major_ref"
          else
            git push origin "refs/tags/$major"
          fi

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          v="${{ steps.detect.outputs.version }}"
          v_stripped="${v#v}"

          # Extract just this version's CHANGELOG section as release notes.
          notes=$(awk -v ver="$v_stripped" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md)

          gh release create "$v" --title "$v" --notes "$notes"
