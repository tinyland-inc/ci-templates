# spoke-deploy-cloudflare-pages — reusable Cloudflare Pages deploy lane.
#
# DRYs the hand-rolled CF-Pages publisher copied into ≥3 spokes
# (Great-Falls-Tool-Bus/greatfallstoolbus.org, transscendsurvival.org, and the
# site.scaffold docs/deploy/cloudflare-pages.md template block). It builds the
# adapter-static `build/` via the house `nix develop --command just` entrypoint,
# then `wrangler pages deploy build`.
#
# This is the sanctioned CF-Pages OPT-IN lane. It does NOT replace the scaffold
# default GitHub-Pages lane (deploy-pages.yml). A spoke's thin
# .github/workflows/deploy-pages.yml becomes a `uses:` wrapper of this workflow.
#
# Credential-skip: when the org CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
# secrets are absent the deploy step no-ops with a ::notice::, so this merges
# safely before the token is minted (personal-account spokes never hold CF
# creds). PR events build only — they never deploy and never mutate repo state.
name: spoke-deploy-cloudflare-pages

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "22"
        description: >-
          Declared Node interface version. The Nix devshell pins the actual
          toolchain (`nix develop --command`), so this is the interface knob
          spokes align to their `.nvmrc` — parity with spoke-ci.yml.
      pnpm_version:
        type: string
        default: "10.13.1"
        description: >-
          pnpm version exposed on the host PATH before wrangler-action runs.
          cloudflare/wrangler-action installs Wrangler with pnpm when it is not
          already present; the Nix devshell keeps pnpm inside
          `nix develop --command`, so the same pinned pnpm is surfaced to the
          host action environment.
      project_name:
        type: string
        default: ""
        description: >-
          Cloudflare Pages project name. Defaults (when empty) to the slugified
          repository name — dots and underscores collapsed to hyphens
          (e.g. `greatfallstoolbus.org` -> `greatfallstoolbus-org`).
      setup_command:
        type: string
        default: just setup
        description: House entrypoint that installs workspace dependencies inside the Nix devshell.
      check_command:
        type: string
        default: just check
        description: House entrypoint that validates the static site inside the Nix devshell.
      build_command:
        type: string
        default: just build
        description: House entrypoint that builds the adapter-static `build/` inside the Nix devshell.
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

# contents: read to check out the tree; deployments: write for the Cloudflare
# Pages deployment record. Blahaj owns DNS / Access / Tunnel — the spoke only
# pushes the built artifact.
permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: tinyland-inc/ci-templates/.github/actions/setup-nix@v2

      # wrangler-action installs Wrangler with pnpm when it is not already on
      # PATH; the Nix devshell keeps Node/pnpm inside `nix develop --command`,
      # so expose the declared host Node + pinned pnpm to the action
      # environment first.
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Install workspace dependencies
        run: nix develop --command ${{ inputs.setup_command }}

      - name: Check static site
        run: nix develop --command ${{ inputs.check_command }}

      - name: Build static site
        run: nix develop --command ${{ inputs.build_command }}

      - name: Resolve Cloudflare Pages target
        id: cloudflare
        env:
          RAW_BRANCH: ${{ github.head_ref || github.ref_name }}
          PROJECT_INPUT: ${{ inputs.project_name }}
        run: |
          project="$PROJECT_INPUT"
          if [ -z "$project" ]; then
            site="${GITHUB_REPOSITORY#*/}"
            project="${site//./-}"
            project="${project//_/-}"
          fi
          branch="${RAW_BRANCH:-main}"
          branch="$(printf '%s' "$branch" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Check Cloudflare Pages credentials
        id: cloudflare_credentials
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Cloudflare Pages deploy because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy static site
        if: github.event_name != 'pull_request' && steps.cloudflare_credentials.outputs.can_deploy == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=${{ steps.cloudflare.outputs.project }} --branch=${{ steps.cloudflare.outputs.branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
