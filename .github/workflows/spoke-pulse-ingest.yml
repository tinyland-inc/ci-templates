name: spoke-pulse-ingest
on:
  workflow_call:
    inputs:
      spoke_slug:
        type: string
        default: ""
      spoke_target:
        type: string
        default: ""
      source_url:
        type: string
        default: ""
      target_path:
        type: string
        default: src/lib/data/public-snapshot.v1.json
      actor_url:
        type: string
        default: ""
      branch_name:
        type: string
        default: automation/tinyland-pulse-ingest

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: spoke-pulse-ingest-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: tinyland-nix
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup workspace
        run: nix develop --command just setup

      - name: Resolve config
        id: cfg
        run: |
          set -euo pipefail
          spoke_slug="${{ inputs.spoke_slug }}"
          spoke_target="${{ inputs.spoke_target }}"
          source_url="${{ inputs.source_url }}"
          target_path="${{ inputs.target_path }}"
          actor_url="${{ inputs.actor_url }}"

          # Fail fast if required inputs are missing.
          if [[ -z "$source_url" || -z "$spoke_target" ]]; then
            echo "::error::source_url and spoke_target are required"
            exit 64
          fi

          {
            echo "spoke_slug=$spoke_slug"
            echo "spoke_target=$spoke_target"
            echo "source_url=$source_url"
            echo "target_path=$target_path"
            echo "actor_url=$actor_url"
          } >> "$GITHUB_OUTPUT"

      - name: Sync snapshot
        run: |
          set -euo pipefail
          cmd=(nix develop --command pnpm exec tsx scripts/static-projection-snapshot.mts sync \
            "${{ steps.cfg.outputs.source_url }}" \
            "${{ steps.cfg.outputs.target_path }}" \
            --expected-source-authority tinyland.dev \
            --expected-spoke "${{ steps.cfg.outputs.spoke_target }}")
          if [[ -n "${{ steps.cfg.outputs.actor_url }}" ]]; then
            cmd+=(--actor-document "${{ steps.cfg.outputs.actor_url }}"
                  --expected-actor-id "${{ steps.cfg.outputs.actor_url }}"
                  --expected-actor-key-id "${{ steps.cfg.outputs.actor_url }}#main-key")
          fi
          "${cmd[@]}"

      - name: Run pre-commit check
        run: nix develop --command just check

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ inputs.branch_name }}
          delete-branch: true
          title: "chore(pulse): refresh ${{ steps.cfg.outputs.spoke_target }} static projection"
          commit-message: |
            chore(pulse): refresh static projection snapshot

            spoke:  ${{ steps.cfg.outputs.spoke_target }}
            source: ${{ steps.cfg.outputs.source_url }}
            target: ${{ steps.cfg.outputs.target_path }}
          body: |
            Automated refresh of the Tinyland Pulse / static projection
            snapshot. Generated by `tinyland-inc/ci-templates@v1.0.0`'s
            `spoke-pulse-ingest.yml`.

            **Spoke**:      `${{ steps.cfg.outputs.spoke_target }}`
            **Source**:     `${{ steps.cfg.outputs.source_url }}`
            **Target path**: `${{ steps.cfg.outputs.target_path }}`
